<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike Air Max 95</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="modal">
        <div class="modal-content">
            <span class="close-button">X</span>
            <div class="left-section">
                <img src="https://imgnike-a.akamaihd.net/768x768/013926IMA8.jpg" alt="Nike Air Max 95" class="main-image">
                <div class="dots-navigation">
                    <span class="dot active"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
                <div class="thumbnails">
                    <img src="https://imgnike-a.akamaihd.net/768x768/013926IMA8.jpg" alt="1">
                    <img src="https://imgnike-a.akamaihd.net/768x768/013926IMA3.jpg" alt="2">
                    <img src="https://imgnike-a.akamaihd.net/768x768/013926IMA2.jpg" alt="3">
                    <button class="next-button">></button>
                </div>
            </div>
            <div class="right-section">
                <h1 class="product-title">NIKE AIR MAX 95</h1>
                <p class="product-subtitle">MEN'S SHOE</p>
                <p class="price">930 R$</p>
                <p class="style-code">Style code: DH8015-002</p>
                <p class="product-description"><span class="brand-name">Nike</span> Air Max 95 Hyper Turquoise pega uma silhueta clássica desenhada por Sergio Lozano e a veste em uma combinação de cores fresca e descolada...</p>
                <p class="in-stock">Em Estoque</p>
                <label for="quantity">Quantidade</label>
                <div class="quantity-container">
                    <input type="number" id="quantity" value="1" min="1">
                </div>
                <button class="buy-button">Comprar</button>
            </div>
        </div>
    </div>
</body>
</html>
